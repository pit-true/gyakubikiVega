<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ベガ技逆引き</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="searchmove_style.css">
</head>
<body>

<h1>ベガ技逆引き</h1>
<div class="note">2文字以上入力で検索します</div>

<div class="box">
  <h2>🔍 技名 → 覚えるポケモン</h2>
  <input id="moveInput" placeholder="例：れんごく / しんそく">
  <ul id="moveResult"></ul>
</div>

<div class="box">
  <h2>🔍 技AND検索 → 両方覚えるポケモン</h2>
  <input id="andMove1" placeholder="技1（例：れんごく）">
  <input id="andMove2" placeholder="技2（例：しんそく）">
  <ul id="andResult"></ul>
</div>

<div class="box">
  <h2>🔍 ポケモン名 → 覚える技</h2>
  <input id="pokemonInput" placeholder="例：アスフィア">
  <ul id="pokemonResult"></ul>
</div>

<script>
// JSONファイルを読み込む
let pokemonData = [];
let moveDetails = {};

Promise.all([
  fetch('vega_all_pokemon_data.json').then(r => r.json()),
  fetch('move_details.json').then(r => r.json())
])
.then(([pData, mData]) => {
  pokemonData = pData;
  moveDetails = mData;
  console.log(`Loaded ${pokemonData.length} Pokemon and ${Object.keys(moveDetails).length} moves`);
})
.catch(err => {
  console.error('Failed to load data:', err);
  document.getElementById("moveResult").innerHTML = "<li>データ読み込みエラー</li>";
  document.getElementById("pokemonResult").innerHTML = "<li>データ読み込みエラー</li>";
});

// ===============================
// 文字数2以上 + 入力停止300ms後に検索
// ===============================
let moveTimer = null;
let pokemonTimer = null;

// ========= 技 → ポケモン =========
document.getElementById("moveInput").addEventListener("input", function () {
  clearTimeout(moveTimer);
  const word = this.value.trim();
  const result = document.getElementById("moveResult");
  result.innerHTML = "";

  if (word.length < 2) return;

  moveTimer = setTimeout(() => {
    if (pokemonData.length === 0) {
      result.innerHTML = "<li>データ読み込み中...</li>";
      return;
    }

    console.log("Searching for move:", word);
    const hit = pokemonData.filter(p =>
      Array.isArray(p.moves) &&
      p.moves.some(m => m === word || m.includes(word))
    );
    console.log("Found Pokemon:", hit.length);

    if (hit.length === 0) {
      result.innerHTML = "<li>候補なし（" + pokemonData.length + "体中0体）</li>";
      return;
    }

    hit.forEach(p => {
      const li = document.createElement("li");
      if (p.url) {
        const a = document.createElement("a");
        a.href = p.url;
        a.textContent = p.name;
        a.className = "pokemon-link";
        a.target = "_blank";
        li.appendChild(a);
      } else {
        li.textContent = p.name;
      }
      result.appendChild(li);
    });
  }, 300);
});

let andTimer = null;

function searchAnd() {
  clearTimeout(andTimer);
  const word1 = document.getElementById('andMove1').value.trim();
  const word2 = document.getElementById('andMove2').value.trim();
  const result = document.getElementById('andResult');
  result.innerHTML = '';

  if (word1.length < 2 || word2.length < 2) return;

  andTimer = setTimeout(() => {
    if (pokemonData.length === 0) {
      result.innerHTML = '<li>データ読み込み中...</li>';
      return;
    }

    const hit = pokemonData.filter(p =>
      Array.isArray(p.moves) &&
      p.moves.some(m => m === word1 || m.includes(word1)) &&
      p.moves.some(m => m === word2 || m.includes(word2))
    );

    if (hit.length === 0) {
      result.innerHTML = '<li>候補なし</li>';
      return;
    }

    hit.forEach(p => {
      const li = document.createElement('li');
      if (p.url) {
        const a = document.createElement('a');
        a.href = p.url;
        a.textContent = p.name;
        a.className = 'pokemon-link';
        a.target = '_blank';
        li.appendChild(a);
      } else {
        li.textContent = p.name;
      }
      result.appendChild(li);
    });
  }, 300);
}

document.getElementById('andMove1').addEventListener('input', searchAnd);
document.getElementById('andMove2').addEventListener('input', searchAnd);

// ========= ポケモン → 技 =========
document.getElementById("pokemonInput").addEventListener("input", function () {
  clearTimeout(pokemonTimer);
  const word = this.value.trim();
  const result = document.getElementById("pokemonResult");
  result.innerHTML = "";

  if (word.length < 2) return;

  pokemonTimer = setTimeout(() => {
    if (pokemonData.length === 0) {
      result.innerHTML = "<li>データ読み込み中...</li>";
      return;
    }

    const hit = pokemonData.filter(p =>
      p.name.includes(word) ||
      (p.hiragana && p.hiragana.includes(word)) ||
      (p.romaji && p.romaji.toLowerCase().includes(word.toLowerCase()))
    );

    if (hit.length === 0) {
      result.innerHTML = "<li>候補なし</li>";
      return;
    }

    const found = hit[0];
    if (!Array.isArray(found.moves) || found.moves.length === 0) {
      result.innerHTML = "<li>技データなし</li>";
      return;
    }

    found.moves.forEach(moveName => {
      const li = document.createElement("li");
      const span = document.createElement("span");

      // Check if move is inherited from pre-evolution
      const moveSource = found.move_sources ? found.move_sources[moveName] : null;
      const isInherited = moveSource && moveSource !== found.name;

      // Display move name with source if inherited
      if (isInherited) {
        span.textContent = `${moveName}(${moveSource})`;
      } else {
        span.textContent = moveName;
      }
      span.className = "move-name";

      // Check if this move has details
      if (moveDetails[moveName]) {
        span.className += " expandable";
        span.style.cursor = "pointer";

        // Create detail div
        const detailDiv = document.createElement("div");
        detailDiv.className = "move-detail";
        detailDiv.textContent = moveDetails[moveName].formatted_description || moveDetails[moveName].description;

        // Toggle on click
        span.addEventListener("click", function() {
          detailDiv.classList.toggle("show");
        });

        li.appendChild(span);
        li.appendChild(detailDiv);
      } else {
        li.appendChild(span);
      }

      result.appendChild(li);
    });
  }, 300);
});
</script>

</body>
</html>
